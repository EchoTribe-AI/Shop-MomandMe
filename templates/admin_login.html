<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · {{ brand.shop_name or brand.brand_label or 'EchoTribe' }}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #f7f7f5;
    --surface: #fff;
    --border: rgba(0,0,0,.12);
    --text: #1a1a17;
    --text3: #606058;
    --text4: #999890;
    --archer: var(--brand-primary, #e85d26);
    --red: #a02828;
    --red-light: #fdecec;
    --r: 10px;
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: .5px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,.04);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--archer);
  }
  .brand strong { font-size: 16px; letter-spacing: .2px; }
  h1 {
    font-size: 20px;
    font-weight: 700;
    margin: 4px 0 6px;
  }
  .sub {
    color: var(--text3);
    font-size: 13px;
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--text4);
    margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    font: inherit;
    font-size: 16px;
    padding: 12px 14px;
    border: .5px solid var(--border);
    border-radius: var(--r);
    background: #fff;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
  }
  input[type="password"]:focus {
    border-color: var(--archer);
    box-shadow: 0 0 0 3px rgba(232,93,38,.10);
  }
  .error {
    background: var(--red-light);
    color: var(--red);
    border-radius: var(--r);
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 14px;
  }
  button {
    width: 100%;
    margin-top: 14px;
    font: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 16px;
    border: none;
    border-radius: var(--r);
    background: var(--archer);
    color: var(--brand-on-primary, #fff);
    cursor: pointer;
    -webkit-appearance: none;
  }
  button:hover { background: #d4501f; }
  .foot {
    margin-top: 18px;
    text-align: center;
    color: var(--text4);
    font-size: 12px;
  }
</style>
{# Brand-vars partial: included AFTER the inline theme <style> so the
   legacy-compat bridge (--brand-primary/--brand-on-primary sourced from
   the active creator row) wins over the static fallback above. NULL
   creator colors → the bridge stays inert. #}
{% include 'partials/_brand_vars.html' %}
</head>
<body>
  <main class="card">
    <div class="brand">
      <span class="dot"></span>
      <strong>{{ brand.shop_name or brand.brand_label or 'EchoTribe' }}</strong>
    </div>
    <h1>Sign in</h1>
    <div class="sub">Enter the admin password to continue.</div>

    {% if error %}<div class="error" role="alert">{{ error }}</div>{% endif %}

    <form method="post" action="{{ url_for('admin_login') }}" autocomplete="off">
      <input type="hidden" name="next" value="{{ next or '/hub' }}">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        autocomplete="current-password"
        required
        autofocus>
      <button type="submit">Continue</button>
    </form>

    <div class="foot">Session lasts 30 days on this device.</div>
  </main>
</body>
</html>
